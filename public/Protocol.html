<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lending Terminal: SUI — Protocol</title>
  <link rel="icon" href="assets/icon.png" />
  <link rel="stylesheet" href="styles.css?v=20260613" />
</head>
<body data-theme="light" data-aesthetic="institutional" data-density="cozy">
  <script>
  (function() {
    try {
      var t = localStorage.getItem('theme');
      var a = localStorage.getItem('aesthetic');
      var d = localStorage.getItem('density');
      if (t) document.body.setAttribute('data-theme', t);
      if (a) document.body.setAttribute('data-aesthetic', a);
      if (d) document.body.setAttribute('data-density', d);
    } catch(e) {}
  })();
  </script>
  <div id="root" class="shell">
    <div class="boot-splash">
      <img class="boot-splash-mark" src="assets/brand/datum-loop.webp" alt="Datum Labs" />
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="charts.jsx?v=20260613"></script>
  <script type="text/babel" src="widgets.jsx?v=20260613"></script>
  <script type="text/babel" src="shell.jsx?v=20260613"></script>
  <script type="text/babel" src="pages.jsx?v=20260613"></script>

  <script type="text/babel" data-presets="env,react">
    // Mount as soon as data.js has finished (DATA_READY always resolves —
    // even on fetch failure — with empty-but-valid SCHEMA shape, so the
    // dashboard chrome always renders).
    //
    // Watchdog: if React still hasn't mounted after 8s (e.g. an extension
    // blocked Babel/React from CDN), clear the boot-splash silently so the
    // user isn't staring at a frozen skeleton forever.
    var __mounted = false;
    setTimeout(function () {
      if (!__mounted) {
        var root = document.getElementById('root');
        if (root) root.innerHTML = '';
      }
    }, 8000);

    window.DATA_READY.then(function () {
      try {
        ReactDOM.createRoot(document.getElementById('root')).render(<PageProtocol />);
        __mounted = true;
      } catch (err) {
        console.error('[mount] render failed:', err);
        var root = document.getElementById('root');
        if (root) root.innerHTML = '';
      }
    });
  </script>


</body>
</html>
